    // 自訂的 Icon 元件，用於載入 Lucide Icons

      return (
        <span
          className={`inline-flex items-center justify-center ${className}`}
          dangerouslySetInnerHTML={{
            __html: `<i data-lucide="${name}" width="${size}" height="${size}" stroke-width="${strokeWidth}" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"></i>`
          }}
        />
      );
    };

    // 🌟 互動式地圖元件
    const GameMap = () => {
      const mapRef = useRef(null);
      const [showNames, setShowNames] = useState(true);

      useEffect(() => {
        // 如果地圖已經初始化過，就不要重複執行
        if (mapRef.current !== null) return;

        // 1. 建立地圖 (L.CRS.Simple 代表我們用的是平面圖片)
        const map = L.map('interactive-map', {
          crs: L.CRS.Simple,
          minZoom: -2,   // 允許縮小
          maxZoom: 2,    // 允許放大
          zoomControl: true,
          attributionControl: false // 隱藏右下角的版權文字
        });
        mapRef.current = map;

        // 2. 設定您的地圖圖片大小 (請在這裡改回你的 4750 和 3800)
        const w = 4750;
        const h = 3800;
        const bounds = [[0, 0], [h, w]];

        // 3. 載入您上傳的總地圖圖片 (請在這裡改回你的檔名)
        const mapImageUrl = "./my_island_map.png"; 
        
        L.imageOverlay(mapImageUrl, bounds, {
           errorOverlayUrl: "https://images.unsplash.com/photo-1524661135-423995f22d0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
        }).addTo(map);

        // 讓視角自動適應圖片大小
        map.fitBounds(bounds);

        // 💡 開發者小工具：在地圖上點擊，會把 X 與 Y 座標顯示在開發人員工具 (F12) 的 Console 中
        map.on('click', function(e) {
          const y = Math.round(e.latlng.lat);
          const x = Math.round(e.latlng.lng);
          console.log(`📍 點擊位置座標 - x: ${x},  y: ${y}`);
        });

        // --- 📍 自訂地標的圖示 (紅色小圓點) ---
        const customIcon = L.divIcon({
          className: 'bg-transparent',
          html: `<div class="w-4 h-4 bg-red-500 rounded-full border-2 border-white shadow-lg transform -translate-y-1/2 cursor-pointer hover:bg-red-400 transition-colors"></div>`,
          iconSize: [16, 16],
          iconAnchor: [8, 8]
        });

        // --- 📍 地標資料清單 (請透過點擊取得真實座標並更新這裡) ---
        const markersData = [
          { name: "新守村", x: 1200, y: 1500 },
          { name: "玩家大廳", x: 1000, y: 1800 },
          { name: "龍門湖", x: 1100, y: 800 },
          { name: "穿山峽谷", x: 600, y: 1400 },
          { name: "冰結神殿", x: 2600, y: 1500 },
          { name: "入天叢林", x: 1300, y: 500 }
        ];

        // 把地標一個一個加上去，使用永久顯示的 Tooltip 作為地名標籤
        markersData.forEach(loc => {
          const marker = L.marker([loc.y, loc.x], { icon: customIcon }).addTo(map);
          marker.bindTooltip(loc.name, {
            permanent: true,
            direction: 'bottom',
            className: 'island-label' // 套用我們設定的 CSS 動畫樣式
          }).openTooltip();
        });

        return () => {
          map.remove(); // 元件卸載時清除地圖
          mapRef.current = null;
        };
      }, []);

      return (
        // 🔧 修復核心：加上 absolute inset-0，強制地圖撐滿外層灰色的框框
        <div className={`absolute inset-0 rounded-2xl overflow-hidden group ${!showNames ? 'hide-map-labels' : ''}`}>

          <div id="interactive-map" className="w-full h-full z-10 relative cursor-crosshair"></div>

            {showNames ? "隱藏島嶼名稱" : "顯示島嶼名稱"}
          </button>

                         value={pokedexSearchTerm}
                         onChange={(e) => setPokedexSearchTerm(e.target.value)}
                         className="w-full pl-10 pr-4 py-2 rounded-full bg-white/20 border border-white/30 text-white placeholder-white/70 focus:outline-none focus:bg-white focus:text-gray-800 focus:placeholder-gray-400 transition"
                       />
                       <Icon name="search" size={18} className="absolute left-3 top-2.5 text-current opacity-70" />
                     </div>
                   </div>
                   <button 
                     onClick={() => setIsPokedexModalOpen(false)} 
                     className="hover:bg-white/20 p-2 rounded-full transition focus:outline-none ml-2"
                     title="關閉視窗"
                   >
                     <Icon name="x" size={28} />
                   </button>
                </div>

                {/* 手機版搜尋列 */}
                <div className="p-4 sm:hidden bg-indigo-50 border-b border-indigo-100 z-10">
                   <div className="relative w-full">
                     <input 
                       type="text" 
                       placeholder="搜尋名稱、編號或稀有度..." 
                       value={pokedexSearchTerm}
                       onChange={(e) => setPokedexSearchTerm(e.target.value)}
                       className="w-full pl-10 pr-4 py-2 rounded-xl bg-white border border-gray-200 text-gray-800 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
                     />
                     <Icon name="search" size={18} className="absolute left-3 top-2.5 text-gray-400" />
                   </div>
                </div>

                {/* 世代切換按鈕列 */}
                <div className="flex overflow-x-auto gap-3 p-4 bg-indigo-50/50 border-b border-indigo-100 no-scrollbar z-10 shadow-sm">
                  {generations.map(gen => (
                    <button
                      key={gen.id}
                      onClick={() => setActiveGen(gen.id)}
                      className={`whitespace-nowrap px-5 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${
                        activeGen === gen.id
                          ? 'bg-indigo-600 text-white shadow-md transform scale-105'
                          : 'bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-100 hover:-translate-y-0.5'
                      }`}
                    >
                      <span>{gen.name}</span>
                      <span className={`text-xs px-2 py-0.5 rounded-full ${activeGen === gen.id ? 'bg-white/20 text-white' : 'bg-indigo-100 text-indigo-500'}`}>
                        {gen.region}
                      </span>
                    </button>
                  ))}
                </div>

                {/* 寶可夢列表表格 */}
                <div className="overflow-y-auto bg-white flex-1 relative">
                  {activeGen === 1 ? (
                  <table className="w-full text-left border-collapse min-w-[600px]">
                    <thead className="sticky top-0 bg-indigo-50 shadow-sm z-10">
                      <tr className="text-indigo-900 font-bold border-b border-indigo-200">
                        <th className="p-4 pl-6 text-center w-20">編號</th>
                        <th className="p-4">寶可夢名稱</th>
                        <th className="p-4">稀有度</th>
                        <th className="p-4">出現率 (%)</th>
                        <th className="p-4 pr-6">生成等級範圍</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {gen1PokemonData
                        .filter(p => p.name.includes(pokedexSearchTerm) || String(p.id).includes(pokedexSearchTerm) || p.rarity.includes(pokedexSearchTerm))
                        .map(poke => (
                        <tr key={poke.id} className="hover:bg-indigo-50/40 transition">
                          <td className="p-4 pl-6 text-center text-gray-400 font-mono font-medium">#{String(poke.id).padStart(3, '0')}</td>
                          <td className="p-4 font-bold text-gray-800 flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-[10px] text-gray-400 border border-gray-200 shadow-inner">
                              IMG
                            </div>
                            {poke.name}
                          </td>
                          <td className="p-4">
                            <span className={`text-xs px-3 py-1 rounded-full font-bold border ${
                              poke.rarity === '超稀有' ? 'bg-purple-100 text-purple-700 border-purple-200' :
                              poke.rarity === '稀有' ? 'bg-rose-100 text-rose-700 border-rose-200' :
                              poke.rarity === '普通' ? 'bg-blue-100 text-blue-700 border-blue-200' :
                              'bg-emerald-100 text-emerald-700 border-emerald-200'
                            }`}>
                              {poke.rarity}
                            </span>
                          </td>
                          <td className="p-4 font-mono text-gray-600 font-medium">{poke.rate}%</td>
                          <td className="p-4 pr-6 text-gray-600">Lv. {poke.min} ~ Lv. {poke.max}</td>
                        </tr>
                      ))}
                      {gen1PokemonData.filter(p => p.name.includes(pokedexSearchTerm) || String(p.id).includes(pokedexSearchTerm) || p.rarity.includes(pokedexSearchTerm)).length === 0 && (
                        <tr>
                          <td colSpan="5" className="text-center py-16 text-gray-500">
                            <div className="flex flex-col items-center justify-center">
                              <Icon name="search" size={48} className="mb-4 opacity-30 text-indigo-400" />
                              找不到符合「<span className="font-bold text-indigo-600">{pokedexSearchTerm}</span>」的寶可夢 😢
                            </div>
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                  ) : (
                    <div className="flex flex-col items-center justify-center h-full min-h-[300px] text-gray-400 bg-gray-50/30 p-8">
                      <Icon name="cat" size={72} className="mb-4 opacity-20 text-indigo-400" />
                      <h3 className="text-2xl font-bold text-gray-500 mb-2">第 {activeGen} 世代圖鑑建置中</h3>
                      <p className="text-gray-400 max-w-md text-center">
                        此世代的寶可夢資料與出現率正在調查與整理中，敬請期待未來伺服器的更新！
                      </p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* NPC 交易彈出視窗 */}
          {selectedNpcTrade && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fadeIn">
              <div className="bg-gray-200 rounded-lg shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] border-4 border-gray-400 animate-slideInRight">
                
                {/* 標題列 (仿遊戲 UI) */}
                <div className="bg-gray-300 p-3 flex justify-between items-center border-b-4 border-gray-400 relative z-10 shadow-sm">
                   <h3 className="text-lg font-black text-gray-700 flex items-center gap-2 tracking-wide">
                      <Icon name="store" size={20} className="text-gray-600" /> 
                      {selectedNpcTrade.name} 的交易清單
                   </h3>
                   <button 
                     onClick={() => setSelectedNpcTrade(null)} 
                     className="bg-red-500 hover:bg-red-600 text-white p-1 rounded-sm border-b-2 border-red-700 transition focus:outline-none"
                     title="關閉視窗"
                   >
                     <Icon name="x" size={20} />
                   </button>
                </div>

                {/* 交易列表內容 */}
                <div className="p-4 sm:p-6 overflow-y-auto space-y-3">
                   {selectedNpcTrade.trades.map((trade, idx) => (
                     <div key={idx} className="bg-gray-300 p-2 sm:p-3 rounded-md border-2 border-b-4 border-gray-400 flex flex-col sm:flex-row sm:items-center justify-between gap-2 sm:gap-4 hover:bg-gray-100 transition duration-200 shadow-inner">
                        
                        {/* 所需材料 (支援多個材料，每個都有專屬圖片) */}
                        <div className="flex-1 flex flex-wrap gap-2">
                           {trade.requires.map((req, rIdx) => (
                             <div key={rIdx} className="flex-1 min-w-[140px] bg-white/60 p-2 rounded border border-gray-400 flex items-center gap-2">
                               <div className="w-8 h-8 bg-gray-200 border border-gray-400 rounded-sm shadow-inner flex items-center justify-center text-gray-400 flex-shrink-0 overflow-hidden">
                                 {req.img 
                                   ? <img src={req.img} alt={req.name} className="w-full h-full object-contain p-1" /> 
                                   : <Icon name="package" size={16} />
                                 }
                               </div>
                               <span className="font-bold text-gray-800 text-sm sm:text-base">{req.name}</span>
                             </div>
                           ))}
                        </div>
                        
                        {/* 箭頭 */}
                        <div className="flex justify-center px-2">
                           <Icon name="arrow-right" size={24} className="text-gray-500 hidden sm:block" />
                           <Icon name="arrow-down" size={20} className="text-gray-500 sm:hidden" />
                        </div>
                        
                        {/* 獲得物品 */}
                        <div className="flex-1 min-w-[140px] bg-emerald-50 p-2 rounded border-2 border-emerald-400 flex items-center gap-2 shadow-sm relative overflow-hidden">
                           <div className="absolute right-0 top-0 h-full w-12 bg-gradient-to-l from-emerald-200 to-transparent opacity-50"></div>
                           <div className="w-8 h-8 bg-emerald-100 border border-emerald-300 rounded-sm shadow-inner flex items-center justify-center text-emerald-600 flex-shrink-0 relative z-10 overflow-hidden">
                             {trade.reward.img 
                               ? <img src={trade.reward.img} alt={trade.reward.name} className="w-full h-full object-contain p-1" /> 
                               : <Icon name="star" size={16} />
                             }
                           </div>
                           <span className="font-black text-emerald-800 text-sm sm:text-base relative z-10">{trade.reward.name}</span>
                        </div>

                     </div>
                   ))}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
